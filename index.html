<script>
        /** 
         * SERVICE LAYER 
         */
        class StorageService {
            static save(key, data) {
                localStorage.setItem(`prompt_puzzle_${key}`, JSON.stringify(data));
            }
            static load(key) {
                const data = localStorage.getItem(`prompt_puzzle_${key}`);
                return data ? JSON.parse(data) : null;
            }
        }

        class AnalyticsEngine {
            static calculateSkillDNA(history) {
                // Mock calculation based on session history
                return {
                    logic: Math.random() * 100,
                    creativity: Math.random() * 100,
                    precision: Math.random() * 100,
                    efficiency: Math.random() * 100,
                    safety: Math.random() * 100
                };
            }
        }

        class GameEngine {
            constructor() {
                this.state = {
                    view: 'onboarding', // onboarding, interview, game, analytics
                    domain: null,
                    difficulty: null,
                    currentScenario: 0,
                    score: 0,
                    xp: 12450,
                    scenarios: [],
                    sessionLog: []
                };
                this.domains = [
                    { id: 'web', name: 'Web Dev', icon: 'code', desc: 'Front-end architecture and debugging puzzles.' },
                    { id: 'health', name: 'Healthcare', icon: 'monitor_heart', desc: 'Medical analysis and empathetic reporting.' },
                    { id: 'legal', name: 'Legal Tech', icon: 'gavel', desc: 'Precise contract generation and policy checking.' },
                    { id: 'creative', name: 'Creative Arts', icon: 'palette', desc: 'Complex image prompting and narrative design.' }
                ];
                this.difficulties = [
                    { level: 'Novice', xp: '1x', color: 'text-tertiary' },
                    { level: 'Specialist', xp: '1.5x', color: 'text-secondary' },
                    { level: 'Elite', xp: '2.5x', color: 'text-primary' }
                ];
            }

            setDomain(domainId) {
                this.state.domain = domainId;
                this.render();
            }

            setDifficulty(diff) {
                this.state.difficulty = diff;
                this.startSession();
            }

            startSession() {
                this.state.view = 'game';
                this.state.currentScenario = 0;
                // Generate Mock Scenarios
                this.state.scenarios = [
                    { type: 'Build', title: 'The Refactor', prompt: 'Create a prompt to refactor a messy React component into atomic parts.', target: 'React Architect' },
                    { type: 'Clean', title: 'Sanitize Input', prompt: 'The following user prompt contains potential injection risks. Clean it while preserving intent.', target: 'Security Filter' },
                    { type: 'Choose', title: 'Optimal Persona', prompt: 'Which persona is best for explaining Quantum Physics to a 5-year-old?', target: 'Storyteller vs Scientist' }
                ];
                this.render();
            }

            submitAction(data) {
                this.state.sessionLog.push(data);
                if (this.state.currentScenario < this.state.scenarios.length - 1) {
                    this.state.currentScenario++;
                    this.render();
                } else {
                    this.state.view = 'analytics';
                    this.render();
                }
            }

            render() {
                const root = document.getElementById('app-root');
                root.innerHTML = '';
                
                switch(this.state.view) {
                    case 'onboarding':
                        root.innerHTML = this.renderInterview();
                        break;
                    case 'game':
                        root.innerHTML = this.renderGameView();
                        break;
                    case 'analytics':
                        root.innerHTML = this.renderAnalyticsView();
                        break;
                }
                this.attachEventListeners();
            }

            renderInterview() {
                return `
                    <div class="max-w-4xl mx-auto space-y-12 py-12 animate-in fade-in duration-700">
                        <div class="text-center space-y-4">
                            <h1 class="font-display text-display text-primary">Initialize Your Profile</h1>
                            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">Select your primary operating domain and difficulty level to begin the diagnostic evaluation.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${this.domains.map(d => `
                                <div onclick="engine.setDomain('${d.id}')" class="glass-card p-6 rounded-xl cursor-pointer group hover:scale-[1.02] ${this.state.domain === d.id ? 'border-primary bg-primary/10' : ''}">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="p-3 bg-surface-container-highest rounded-lg text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
                                            <span class="material-symbols-outlined">${d.icon}</span>
                                        </div>
                                        ${this.state.domain === d.id ? '<span class="material-symbols-outlined text-primary">check_circle</span>' : ''}
                                    </div>
                                    <h3 class="font-headline-md text-headline-md mb-2">${d.name}</h3>
                                    <p class="font-body-md text-body-md text-on-surface-variant">${d.desc}</p>
                                </div>
                            `).join('')}
                        </div>

                        ${this.state.domain ? `
                        <div class="space-y-6 pt-8 border-t border-white/5 animate-in slide-in-from-bottom-4 duration-500">
                            <h2 class="font-headline-md text-headline-md text-center">Select Difficulty Engine</h2>
                            <div class="flex flex-wrap justify-center gap-4">
                                ${this.difficulties.map(df => `
                                    <button onclick="engine.setDifficulty('${df.level}')" class="px-8 py-4 glass-card rounded-xl font-label-md text-label-md hover:border-primary flex flex-col items-center gap-1 min-w-[160px]">
                                        <span class="${df.color} font-bold">${df.level}</span>
                                        <span class="text-on-surface-variant text-xs">${df.xp} Multiplier</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            renderGameView() {
                const scenario = this.state.scenarios[this.state.currentScenario];
                const progress = ((this.state.currentScenario + 1) / this.state.scenarios.length) * 100;

                return `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
                        <!-- Left: Status Dashboard -->
                        <div class="lg:col-span-3 space-y-6">
                            <div class="glass-card p-6 rounded-xl">
                                <h4 class="font-label-md text-label-md text-on-surface-variant mb-4 uppercase tracking-widest">Active Session</h4>
                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-label-sm font-label-sm mb-1">
                                            <span>PROGRESS</span>
                                            <span>${this.state.currentScenario + 1}/${this.state.scenarios.length}</span>
                                        </div>
                                        <div class="h-2 bg-surface-container-highest rounded-full">
                                            <div class="h-full bg-primary transition-all duration-500" style="width: ${progress}%"></div>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 p-3 bg-surface-container-low rounded-lg border border-white/5">
                                        <span class="material-symbols-outlined text-secondary">bolt</span>
                                        <div>
                                            <div class="text-label-sm text-on-surface-variant">ACCURACY</div>
                                            <div class="font-label-md text-label-md">94.2%</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="glass-card p-6 rounded-xl hidden lg:block">
                                <h4 class="font-label-md text-label-md text-on-surface-variant mb-4">REAL-TIME TELEMETRY</h4>
                                <div class="space-y-6">
                                    <div class="flex justify-center">
                                        <div class="relative w-32 h-32">
                                            <svg class="w-full h-full" viewBox="0 0 100 100">
                                                <circle class="text-surface-container-highest" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                                                <circle class="text-tertiary progress-ring" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="${251.2 * 0.3}" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                                            </svg>
                                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                                <span class="font-label-md text-lg">72</span>
                                                <span class="text-[8px] text-on-surface-variant">TOKENS/S</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="text-center text-xs text-on-surface-variant font-label-sm italic">
                                        "Prompt density is optimal for the current complexity matrix."
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Center: Workstation -->
                        <div class="lg:col-span-6 space-y-6">
                            <div class="glass-card p-8 rounded-xl min-h-[500px] flex flex-col">
                                <div class="flex justify-between items-start mb-8">
                                    <div>
                                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest mb-2">
                                            Type: ${scenario.type}
                                        </div>
                                        <h2 class="font-headline-md text-headline-md">${scenario.title}</h2>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-label-sm text-on-surface-variant">TARGET PERSONA</div>
                                        <div class="font-label-md text-secondary">${scenario.target}</div>
                                    </div>
                                </div>

                                <div class="bg-surface-container-lowest p-6 rounded-xl border border-white/5 mb-8 grow">
                                    <p class="font-body-lg text-body-lg leading-relaxed text-on-surface">
                                        ${scenario.prompt}
                                    </p>
                                </div>

                                <div class="space-y-4">
                                    <div class="relative">
                                        <textarea id="player-input" rows="4" class="w-full bg-surface-container-highest border border-white/10 rounded-xl p-4 font-label-md text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-outline outline-none transition-all" placeholder="Enter your optimized prompt engineering solution..."></textarea>
                                        <div class="absolute bottom-4 right-4 flex gap-2">
                                            <button class="p-2 hover:bg-white/5 rounded-lg text-on-surface-variant"><span class="material-symbols-outlined text-sm">history</span></button>
                                            <button class="p-2 hover:bg-white/5 rounded-lg text-on-surface-variant"><span class="material-symbols-outlined text-sm">auto_fix</span></button>
                                        </div>
                                    </div>
                                    <button onclick="engine.submitAction('completed')" class="w-full py-4 primary-btn rounded-xl font-bold font-label-md uppercase tracking-widest flex items-center justify-center gap-2">
                                        Execute Pulse
                                        <span class="material-symbols-outlined">rocket_launch</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Live Feed / Hints -->
                        <div class="lg:col-span-3 space-y-6">
                            <div class="glass-card p-6 rounded-xl">
                                <h4 class="font-label-md text-label-md text-on-surface-variant mb-4">SYSTEM CONSTRAINTS</h4>
                                <ul class="space-y-3">
                                    <li class="flex items-center gap-3 text-xs">
                                        <span class="material-symbols-outlined text-primary text-sm">check</span>
                                        <span>Max 200 tokens</span>
                                    </li>
                                    <li class="flex items-center gap-3 text-xs">
                                        <span class="material-symbols-outlined text-primary text-sm">check</span>
                                        <span>Use Chain of Thought</span>
                                    </li>
                                    <li class="flex items-center gap-3 text-xs opacity-50">
                                        <span class="material-symbols-outlined text-sm">block</span>
                                        <span>No JSON allowed</span>
                                    </li>
                                </ul>
                            </div>

                            <div class="bg-primary/5 border border-primary/20 p-6 rounded-xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-2 opacity-10">
                                    <span class="material-symbols-outlined text-6xl">lightbulb</span>
                                </div>
                                <h4 class="font-label-md text-label-md text-primary mb-2">PRO-TIP</h4>
                                <p class="text-xs text-on-surface-variant leading-relaxed">
                                    "When refactoring, try using the 'Socratic Method' to guide the LLM through each logic block individually."
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderAnalyticsView() {
                const dna = AnalyticsEngine.calculateSkillDNA();
                return `
                    <div class="max-w-6xl mx-auto space-y-gutter animate-in fade-in zoom-in-95 duration-1000">
                        <div class="flex flex-col md:flex-row justify-between items-end gap-6 border-b border-white/10 pb-8">
                            <div>
                                <h1 class="font-display text-display text-white mb-2">Performance Matrix</h1>
                                <p class="text-on-surface-variant font-body-lg">Diagnostic complete. Subject demonstrates high creative variance.</p>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="location.reload()" class="px-6 py-3 glass-card rounded-xl text-label-md font-label-md border-white/20">RETRY SESSION</button>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">

                            <div class="lg:col-span-1 glass-card p-8 rounded-2xl flex flex-col items-center justify-center">

                                <div class="relative w-64 h-64 skill-radar">
                                    <svg viewBox="0 0 100 100" class="w-full h-full stroke-primary fill-primary/20">
                                        <polygon points="50,10 90,40 75,90 25,90 10,40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                                        <polygon points="50,25 75,45 65,75 35,75 25,45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                                        <!-- Active Radar Shape (Simulated) -->
                                        <polygon points="50,${10+Math.random()*20} ${90-Math.random()*20},40 ${75-Math.random()*15},${90-Math.random()*15} ${25+Math.random()*15},${90-Math.random()*15} ${10+Math.random()*20},40" stroke-width="2"/>

                                    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-4 text-[10px] font-label-md">LOGIC</div>
                                    <div class="absolute top-1/2 right-0 translate-x-4 -translate-y-1/2 text-[10px] font-label-md">CREATIVITY</div>
                                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-4 text-[10px] font-label-md">EFFICIENCY</div>
                                </div>
                            </div>

                            <!-- Summary Cards -->
                            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="glass-card p-6 rounded-2xl flex flex-col justify-between">
